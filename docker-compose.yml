# docker-compose.yml
# Praecantator backend + nginx reverse proxy for  deployment.
#
# Usage :
#   docker compose up -d --build        # first run / after code changes
#   docker compose logs -f backend      # stream backend logs
#   docker compose ps                   # check health status
#   docker compose down                 # stop everything
#
# Prerequisites :
#   1. Backend/.env filled in (copy from Backend/.env.docker.example)
#   2. secrets/gcp-sa.json placed (your GCP service account key)

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: praecantator-backend
    restart: unless-stopped
    # Port 8000 is NOT published to the host — nginx handles all external traffic.
    expose:
      - "8000"
    env_file:
      - ./Backend/.env
    volumes:
      # GCP service-account key — read-only, never baked into the image.
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
      # Named volume for SQLite fallback DB (local_fallback.db).
      # Without this, all SQLite data (incidents, signals, contexts, cache)
      # is wiped on every container restart or rebuild.
      - backend-data:/app
    networks:
      - app-network
    healthcheck:
      # Use /api/ping (no auth, no DB calls) not /health (runs disruption_snapshot + registry queries).
      # /api/ping is the lightweight keepalive defined in main.py.
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s        # torch import + model load takes time
    # torch + ML libs open many file descriptors. Raise the nofile limit.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # APScheduler runs background jobs; give it 30s to finish before SIGKILL.
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: praecantator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"              # Reserved for HTTPS — see nginx/nginx.conf
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment after running Certbot to mount Let's Encrypt certs:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:    # Persists SQLite fallback DB across restarts and rebuilds.
