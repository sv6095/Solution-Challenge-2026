# docker-compose.yml
# Praecantator backend, Redis/Celery workers, and nginx reverse proxy.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f backend celery-worker celery-beat
#   docker compose ps
#   docker compose down
#
# Prerequisites:
#   1. Backend/.env filled in
#   2. secrets/gcp-sa.json placed when using GCP services

services:
  redis:
    image: redis:7.4-alpine
    container_name: praecantator-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: praecantator-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./Backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_PROVIDER: redis
      LOCAL_DB_PATH: /app/data/local_fallback.db
      ENABLE_IN_PROCESS_SCHEDULERS: "false"
    volumes:
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  celery-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: praecantator-celery-worker
    restart: unless-stopped
    command: ["celery", "-A", "scheduler.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file:
      - ./Backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_PROVIDER: redis
      LOCAL_DB_PATH: /app/data/local_fallback.db
      ENABLE_IN_PROCESS_SCHEDULERS: "false"
    volumes:
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  celery-beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: praecantator-celery-beat
    restart: unless-stopped
    command: ["celery", "-A", "scheduler.celery_app:celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - ./Backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_PROVIDER: redis
      LOCAL_DB_PATH: /app/data/local_fallback.db
      ENABLE_IN_PROCESS_SCHEDULERS: "false"
    volumes:
      - ./secrets/gcp-sa.json:/secrets/gcp-sa.json:ro
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    networks:
      - app-network
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: praecantator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
  redis-data:
