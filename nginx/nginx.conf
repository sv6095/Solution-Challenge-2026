# nginx/nginx.conf
# Reverse proxy for the Praecantator FastAPI backend.
# nginx sits in front of the backend container on port 80 (and 443 when SSL is added).
#
# To enable HTTPS (Let's Encrypt / Certbot), follow the instructions in
# docs/SETUP_GUIDE.md Step 4 and uncomment the SSL server block below.

events {
    worker_connections 1024;
}

http {
    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # ── Upstream — matches the docker compose service name ───────────────────
    upstream praecantator_backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Protects the API from abuse. Adjust burst/rate as needed.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ── HTTP server (port 80) ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;          # Replace _ with your domain when you have one.

        # Client body limit — increase if you upload large files via the API.
        client_max_body_size 50M;

        # ── WebSocket endpoint (/ws/<tenant_id>) ─────────────────────────────
        # FastAPI registers: @app.websocket("/ws/{tenant_id}")
        location ~ ^/ws/ {
            proxy_pass         http://praecantator_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Keep WebSocket connections alive for up to 24 h.
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── All other API / health traffic ────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://praecantator_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — LLM agent calls can take a while.
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;

            # Buffer tuning
            proxy_buffering           on;
            proxy_buffer_size         16k;
            proxy_buffers             8 16k;
            proxy_busy_buffers_size   32k;
        }

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         DENY;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Referrer-Policy         "strict-origin-when-cross-origin";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTPS server block (uncomment after running Certbot on EC2)
    # See docs/SETUP_GUIDE.md Step 4 → "Enable HTTPS"
